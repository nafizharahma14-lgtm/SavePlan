<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SavePlan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Fredoka:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#fff6fb,#f3f0ff);
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100vh;
  background:linear-gradient(135deg,#ffd6ec,#e8d4ff,#dbeafe);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
  z-index:999;
}

.icon{
  font-size:60px;
}

.bounce{
  animation:bounce 1s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

.coin{
  position:absolute;
  top:-50px;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

#splash h1{
  font-family:'Fredoka';
  color:#ff4fa3;
}

/* APP */
.app{display:none;padding:15px}

.header{
  background:linear-gradient(135deg,#ffd6ec,#e8d4ff,#dbeafe);
  border-radius:20px;
  padding:15px;
  text-align:center;
  margin-bottom:15px;
}
.header h2{
  font-family:'Fredoka';
  color:#ff4fa3;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#fdf2f8;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#ff9ecf,#ff6fb5);
  color:#fff;
  font-weight:bold;
  margin-top:5px;
}

.delete{
  background:linear-gradient(135deg,#ffb3c6,#ff6b81);
}

.item{
  background:#fff;
  padding:12px;
  border-radius:15px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.nama{
  text-align:center;
  font-family:'Fredoka';
  font-size:18px;
  color:#ff4fa3;
}

.progress{
  height:10px;
  background:#f3e8ff;
  border-radius:10px;
}
.fill{
  height:100%;
  background:linear-gradient(to right,#ff9ecf,#ffc6e5);
  border-radius:10px;
}

.history{
  font-size:12px;
  margin-top:8px;
  background:#fff0f6;
  padding:8px;
  border-radius:10px;
}

.chartBox{
  width:100%;
  height:180px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="icon bounce">💰</div>
  <h1>SavePlan</h1>
  <p>Nabung terarah, tujuan jadi nyata</p>
</div>

<div class="app" id="app">

<div class="header">
  <p>✨ Sedikit demi sedikit jadi impian</p>
  <h2>SavePlan</h2>
</div>

<div class="card">
  <input id="barang" placeholder="Nama barang">
  <input id="target" type="number" placeholder="Target (Rp)">
  <input id="nominal" type="number" placeholder="Nominal nabung">

  <select id="tipe">
    <option value="Harian">Harian</option>
    <option value="Mingguan">Mingguan</option>
    <option value="Bulanan">Bulanan</option>
  </select>

  <button onclick="tambahBarang()">Tambah Target</button>
</div>

<div id="list"></div>

</div>

<script>
/* HUJAN SIMBOL */
let symbols = ["💰","Rp","+","★"];
for(let i=0;i<25;i++){
  let coin=document.createElement("div");
  coin.className="coin";
  coin.innerText=symbols[Math.floor(Math.random()*symbols.length)];
  coin.style.left=Math.random()*100+"%";
  coin.style.animationDuration=(2+Math.random()*3)+"s";
  document.getElementById("splash").appendChild(coin);
}

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2500);

/* DATA */
let data = JSON.parse(localStorage.getItem("saveplan")) || [];
let charts = {};

function tambahBarang(){
  let barang = document.getElementById("barang").value;
  let target = Number(document.getElementById("target").value);
  let nominal = Number(document.getElementById("nominal").value);
  let tipe = document.getElementById("tipe").value;

  if(!barang || target<=0 || nominal<=0){
    alert("Isi semua data!");
    return;
  }

  data.push({barang,target,nominal,tipe,saldo:0,history:[],chart:[0]});
  simpan(); tampil();
}

function nabung(i){
  let d = data[i];
  if(d.saldo >= d.target){
    alert("Target sudah tercapai!");
    return;
  }

  d.saldo += d.nominal;
  if(d.saldo > d.target) d.saldo = d.target;

  d.history.push("+ Rp "+d.nominal);
  d.chart.push(d.saldo);

  simpan(); tampil();
}

function keluar(i){
  let uang = Number(document.getElementById("keluar"+i).value);
  let ket = document.getElementById("ket"+i).value;

  if(!uang || !ket){
    alert("Isi dulu!");
    return;
  }

  let d = data[i];
  d.saldo -= uang;
  if(d.saldo<0) d.saldo=0;

  d.history.push("- Rp "+uang+" ("+ket+")");
  d.chart.push(d.saldo);

  simpan(); tampil();
}

function hapus(i){
  if(confirm("Hapus target?")){
    data.splice(i,1);
    simpan(); tampil();
  }
}

function tampil(){
  let list = document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    let persen = (d.saldo/d.target)*100;
    if(persen>100) persen=100;

    let sisa = d.target - d.saldo;
    let estimasi = Math.ceil(sisa / d.nominal);
    let label = d.tipe=="Harian"?"hari":d.tipe=="Mingguan"?"minggu":"bulan";

    let historyHTML = d.history.map(h=>`<div>${h}</div>`).join("");

    list.innerHTML += `
    <div class="item">
      <div class="nama">🎀 ${d.barang} 🎀</div>

      Rp ${d.saldo} / Rp ${d.target}<br>
      ${persen.toFixed(0)}%<br>
      <b>${d.tipe}</b> | Estimasi: ${estimasi} ${label}

      <div class="progress">
        <div class="fill" style="width:${persen}%"></div>
      </div>

      <button onclick="nabung(${i})">+ Nabung</button>

      <input id="keluar${i}" placeholder="Uang keluar">
      <input id="ket${i}" placeholder="Keterangan">
      <button onclick="keluar(${i})">Catat Pengeluaran</button>

      <button class="delete" onclick="hapus(${i})">Hapus</button>

      <div class="history">
        <b>Riwayat</b>
        ${historyHTML}
      </div>

      <div class="chartBox">
        <canvas id="chart${i}"></canvas>
      </div>
    </div>
    `;
  });

  setTimeout(drawChart,200);
}

function drawChart(){
  data.forEach((d,i)=>{
    let ctx = document.getElementById("chart"+i);
    if(!ctx) return;

    if(charts[i]) charts[i].destroy();

    charts[i] = new Chart(ctx,{
      type:"line",
      data:{
        labels:d.chart.map((_,idx)=>"Ke-"+(idx+1)),
        datasets:[{
          data:d.chart,
          borderColor:"#ff6fb5",
          backgroundColor:"rgba(255,111,181,0.2)",
          fill:true,
          tension:0.4
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        scales:{y:{beginAtZero:true}},
        plugins:{legend:{display:false}}
      }
    });
  });
}

function simpan(){
  localStorage.setItem("saveplan", JSON.stringify(data));
}

tampil();
</script>

</body>
</html>
