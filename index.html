<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SavePlan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#fff6fb,#f3f0ff);
}
.app{padding:15px}

.header{
  background:linear-gradient(135deg,#ffd6ec,#e8d4ff,#dbeafe);
  border-radius:20px;
  padding:15px;
  text-align:center;
  margin-bottom:15px;
}
.header h2{font-family:'Fredoka';color:#ff4fa3;}

.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#fdf2f8;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#ff9ecf,#ff6fb5);
  color:#fff;
  font-weight:bold;
  margin-top:5px;
}

.delete{background:linear-gradient(135deg,#ffb3c6,#ff6b81);}
.edit{background:linear-gradient(135deg,#cdb4ff,#b197fc);}

.item{
  background:#fff;
  padding:12px;
  border-radius:15px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.progress{
  height:10px;
  background:#f3e8ff;
  border-radius:10px;
}
.fill{
  height:100%;
  background:linear-gradient(to right,#ff9ecf,#ffc6e5);
  border-radius:10px;
}

.history{
  font-size:12px;
  margin-top:8px;
  background:#fff0f6;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <p>✨ Sedikit demi sedikit jadi impian</p>
  <h2>SavePlan</h2>
</div>

<div class="card">
  <input id="barang" placeholder="Nama barang">
  <input id="target" type="number" placeholder="Target (Rp)">
  <input id="nominal" type="number" placeholder="Nominal nabung">

  <select id="tipe">
    <option value="Harian">Harian</option>
    <option value="Mingguan">Mingguan</option>
    <option value="Bulanan">Bulanan</option>
  </select>

  <button onclick="tambahBarang()">Tambah Target</button>
</div>

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("saveplan")) || [];

function tambahBarang(){
  let barang = document.getElementById("barang").value;
  let target = Number(document.getElementById("target").value);
  let nominal = Number(document.getElementById("nominal").value);
  let tipe = document.getElementById("tipe").value;

  if(!barang || target<=0 || nominal<=0){
    alert("Isi semua data!");
    return;
  }

  data.push({
    barang, target, nominal, tipe,
    saldo:0,
    history:[]
  });

  simpan();
  tampil();
}

function nabung(i){
  let d = data[i];
  d.saldo += d.nominal;
  d.history.push("+ Rp "+d.nominal);
  simpan();
  tampil();
}

function keluar(i){
  let uang = Number(document.getElementById("keluar"+i).value);
  let ket = document.getElementById("ket"+i).value;

  if(!uang || !ket){
    alert("Isi dulu!");
    return;
  }

  let d = data[i];
  d.saldo -= uang;
  if(d.saldo<0) d.saldo=0;

  d.history.push("- Rp "+uang+" ("+ket+")");

  simpan();
  tampil();
}

function hapus(i){
  if(confirm("Hapus target?")){
    data.splice(i,1);
    simpan();
    tampil();
  }
}

function tampil(){
  let list = document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    let persen = (d.saldo/d.target)*100;
    if(persen>100) persen=100;

    let sisa = d.target - d.saldo;

    // 🔥 ESTIMASI SESUAI TIPE
    let estimasi = 0;
    if(d.tipe=="Harian"){
      estimasi = Math.ceil(sisa/d.nominal)+" hari";
    }
    if(d.tipe=="Mingguan"){
      estimasi = Math.ceil(sisa/d.nominal)+" minggu";
    }
    if(d.tipe=="Bulanan"){
      estimasi = Math.ceil(sisa/d.nominal)+" bulan";
    }

    let historyHTML = d.history.map(h => `<div>${h}</div>`).join("");

    list.innerHTML += `
    <div class="item">
      <b>${d.barang}</b><br>
      Rp ${d.saldo} / Rp ${d.target}<br>
      ${persen.toFixed(0)}%<br>
      <b>${d.tipe}</b> | Estimasi: ${estimasi}

      <div class="progress">
        <div class="fill" style="width:${persen}%"></div>
      </div>

      <button onclick="nabung(${i})">+ Nabung</button>

      <!-- FORM UANG KELUAR -->
      <input id="keluar${i}" placeholder="Uang keluar">
      <input id="ket${i}" placeholder="Keterangan">
      <button onclick="keluar(${i})">Catat Pengeluaran</button>

      <button class="delete" onclick="hapus(${i})">🗑 Hapus</button>

      <div class="history">
        <b>Riwayat</b>
        ${historyHTML}
      </div>
    </div>
    `;
  });
}

function simpan(){
  localStorage.setItem("saveplan", JSON.stringify(data));
}

tampil();
</script>

</body>
</html>
