<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SavePlan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Fredoka:wght@500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#fff6fb,#f3f0ff);
}
.app{padding:15px}

.header{
  background:linear-gradient(135deg,#ffd6ec,#e8d4ff,#dbeafe);
  border-radius:20px;
  padding:15px;
  text-align:center;
  margin-bottom:15px;
}
.header h2{font-family:'Fredoka';color:#ff4fa3;}

.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#fdf2f8;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#ff9ecf,#ff6fb5);
  color:#fff;
  font-weight:bold;
  margin-top:5px;
}

.delete{background:linear-gradient(135deg,#ffb3c6,#ff6b81);}
.edit{background:linear-gradient(135deg,#cdb4ff,#b197fc);}

.item{
  background:#fff;
  padding:12px;
  border-radius:15px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.progress{
  height:10px;
  background:#f3e8ff;
  border-radius:10px;
}
.fill{
  height:100%;
  background:linear-gradient(to right,#ff9ecf,#ffc6e5);
  border-radius:10px;
}

.history{
  font-size:12px;
  margin-top:8px;
  background:#fff0f6;
  padding:8px;
  border-radius:10px;
}

canvas{margin-top:10px;}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <p>✨ Sedikit demi sedikit jadi impian</p>
  <h2>SavePlan</h2>
</div>

<div class="card">
  <input id="barang" placeholder="Nama barang">
  <input id="target" type="number" placeholder="Target (Rp)">
  <input id="nominal" type="number" placeholder="Nominal nabung">
  <button onclick="tambahBarang()">Tambah Target</button>
</div>

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("saveplan")) || [];

function tambahBarang(){
  let barang = document.getElementById("barang").value;
  let target = Number(document.getElementById("target").value);
  let nominal = Number(document.getElementById("nominal").value);

  if(!barang || target<=0 || nominal<=0){
    alert("Isi semua data!");
    return;
  }

  data.push({
    barang,
    target,
    nominal,
    saldo:0,
    history:[],
    chart:[]
  });

  simpan();
  tampil();
}

function nabung(i){
  let d = data[i];
  d.saldo += d.nominal;
  d.history.push("+ Rp "+d.nominal);
  d.chart.push(d.saldo);

  simpan();
  tampil();
}

function keluar(i){
  let uang = Number(document.getElementById("keluar"+i).value);
  let ket = document.getElementById("ket"+i).value;

  if(!uang || !ket){
    alert("Isi dulu!");
    return;
  }

  let d = data[i];
  d.saldo -= uang;
  if(d.saldo<0) d.saldo=0;

  d.history.push("- Rp "+uang+" ("+ket+")");
  d.chart.push(d.saldo);

  simpan();
  tampil();
}

function hapus(i){
  if(confirm("Hapus target?")){
    data.splice(i,1);
    simpan();
    tampil();
  }
}

function edit(i){
  let barang = prompt("Nama baru:", data[i].barang);
  let target = prompt("Target baru:", data[i].target);

  if(barang && target){
    data[i].barang = barang;
    data[i].target = Number(target);
    simpan();
    tampil();
  }
}

function tampil(){
  let list = document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    let persen = (d.saldo/d.target)*100;
    if(persen>100) persen=100;

    let historyHTML = d.history.map(h => `<div>${h}</div>`).join("");

    list.innerHTML += `
    <div class="item">
      <b>${d.barang}</b><br>
      Rp ${d.saldo} / Rp ${d.target}<br>
      ${persen.toFixed(0)}%

      <div class="progress">
        <div class="fill" style="width:${persen}%"></div>
      </div>

      <button onclick="nabung(${i})">+ Nabung</button>

      <!-- FORM UANG KELUAR -->
      <input id="keluar${i}" placeholder="Uang keluar">
      <input id="ket${i}" placeholder="Keterangan">
      <button onclick="keluar(${i})">Catat Pengeluaran</button>

      <button class="edit" onclick="edit(${i})">✏️ Edit</button>
      <button class="delete" onclick="hapus(${i})">🗑 Hapus</button>

      <div class="history">
        <b>Riwayat</b>
        ${historyHTML}
      </div>

      <canvas id="chart${i}" height="100"></canvas>
    </div>
    `;
  });

  setTimeout(drawChart,100);
}

function drawChart(){
  data.forEach((d,i)=>{
    new Chart(document.getElementById("chart"+i),{
      type:"line",
      data:{
        labels:d.chart.map((_,i)=>i+1),
        datasets:[{
          data:d.chart,
          borderWidth:2,
          fill:false
        }]
      },
      options:{
        plugins:{legend:{display:false}}
      }
    });
  });
}

function simpan(){
  localStorage.setItem("saveplan", JSON.stringify(data));
}

/* 🔔 NOTIF (simple reminder) */
setInterval(()=>{
  if(data.length>0){
    alert("Jangan lupa nabung hari ini ya 💰");
  }
},30000);

tampil();
</script>

</body>
</html>
