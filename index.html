<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SavePlan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#fff6fb,#f3f0ff);
}

.app{padding:15px}

/* HEADER */
.header{
  background:linear-gradient(135deg,#ffd6ec,#e8d4ff,#dbeafe);
  border-radius:20px;
  padding:15px;
  text-align:center;
  margin-bottom:15px;
}
.header h2{
  font-family:'Fredoka';
  color:#ff4fa3;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#fdf2f8;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#ff9ecf,#ff6fb5);
  color:#fff;
  font-weight:bold;
  margin-top:5px;
}

/* DELETE BUTTON */
.delete{
  background:linear-gradient(135deg,#ffb3c6,#ff6b81);
}

/* ITEM */
.item{
  background:#fff;
  padding:12px;
  border-radius:15px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.progress{
  height:10px;
  background:#f3e8ff;
  border-radius:10px;
  margin:5px 0;
}
.fill{
  height:100%;
  background:linear-gradient(to right,#ff9ecf,#ffc6e5);
  border-radius:10px;
}

.history{
  font-size:12px;
  margin-top:5px;
  background:#fff0f6;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <p>✨ Sedikit demi sedikit jadi impian</p>
  <h2>SavePlan</h2>
</div>

<!-- INPUT -->
<div class="card">
  <input id="barang" placeholder="Nama barang">
  <input id="target" type="number" placeholder="Target (Rp)">
  <input id="nominal" type="number" placeholder="Nominal nabung">

  <select id="tipe">
    <option>Harian</option>
    <option>Mingguan</option>
    <option>Bulanan</option>
  </select>

  <button onclick="tambahBarang()">Tambah Target</button>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("saveplan")) || [];

function tambahBarang(){
  let barang = document.getElementById("barang").value;
  let target = Number(document.getElementById("target").value);
  let nominal = Number(document.getElementById("nominal").value);
  let tipe = document.getElementById("tipe").value;

  if(!barang || target<=0 || nominal<=0){
    alert("Isi semua data!");
    return;
  }

  data.push({
    barang,
    target,
    nominal,
    tipe,
    saldo:0,
    history:[]
  });

  simpan();
  tampil();
}

function nabung(i){
  let item = data[i];

  item.saldo += item.nominal;
  item.history.push("+ Rp "+item.nominal+" (nabung)");

  simpan();
  tampil();
}

function keluar(i){
  let uang = prompt("Uang keluar?");
  let ket = prompt("Keterangan?");

  if(!uang || !ket) return;

  uang = Number(uang);

  let item = data[i];
  item.saldo -= uang;
  if(item.saldo < 0) item.saldo = 0;

  item.history.push("- Rp "+uang+" ("+ket+")");

  simpan();
  tampil();
}

function hapus(i){
  if(confirm("Hapus target ini?")){
    data.splice(i,1);
    simpan();
    tampil();
  }
}

function tampil(){
  let list = document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    let persen = (d.saldo/d.target)*100;
    if(persen>100) persen=100;

    let sisa = d.target - d.saldo;
    let waktu = Math.ceil(sisa / d.nominal);

    let historyHTML = d.history.map(h => `<div>${h}</div>`).join("");

    list.innerHTML += `
    <div class="item">
      <b>${d.barang}</b><br>
      Rp ${d.saldo} / Rp ${d.target}<br>
      ${persen.toFixed(0)}%<br>
      Estimasi: ${waktu} ${d.tipe}

      <div class="progress">
        <div class="fill" style="width:${persen}%"></div>
      </div>

      <button onclick="nabung(${i})">+ Nabung</button>
      <button onclick="keluar(${i})">💸 Uang Keluar</button>
      <button class="delete" onclick="hapus(${i})">🗑 Hapus Target</button>

      <div class="history">
        <b>Riwayat</b>
        ${historyHTML}
      </div>
    </div>
    `;
  });
}

function simpan(){
  localStorage.setItem("saveplan", JSON.stringify(data));
}

tampil();
</script>

</body>
</html>
